server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: task-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: task-logs
          task_slug: ${TASK_SLUG}
          environment: local
          __path__: ${TASK_LOG_DIR}/*.log

