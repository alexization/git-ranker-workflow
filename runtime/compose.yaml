services:
  git-ranker-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - 127.0.0.1:${MYSQL_PORT}:3306
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  git-ranker-api:
    build:
      context: ../git-ranker
      dockerfile: Dockerfile
    container_name: git-ranker-api
    restart: unless-stopped
    depends_on:
      git-ranker-db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      DB_URL: jdbc:mysql://git-ranker-db:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI}
      GITHUB_API_TOKENS: ${GITHUB_API_TOKENS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION}
      BATCH_CHUNK_SIZE: ${BATCH_CHUNK_SIZE}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      APP_OAUTH2_AUTHORIZED_REDIRECT_URI: ${APP_OAUTH2_AUTHORIZED_REDIRECT_URI}
      APP_COOKIE_DOMAIN: ${APP_COOKIE_DOMAIN}
      APP_COOKIE_SECURE: ${APP_COOKIE_SECURE}
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: -Xms512m -Xmx1024m
    ports:
      - ${BACKEND_HTTP_PORT}:8080
      - 127.0.0.1:${BACKEND_MANAGEMENT_PORT}:9090
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  git-ranker-client:
    build:
      context: ../git-ranker-client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
    restart: unless-stopped
    depends_on:
      git-ranker-api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: Asia/Seoul
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
    ports:
      - ${CLIENT_PORT}:3000
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.5.1
    restart: unless-stopped
    depends_on:
      git-ranker-api:
        condition: service_healthy
    volumes:
      - ../git-ranker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - 127.0.0.1:${PROMETHEUS_PORT}:9090
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d

  loki:
    image: grafana/loki:3.6.5
    restart: unless-stopped
    volumes:
      - ../git-ranker/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    ports:
      - 127.0.0.1:${LOKI_PORT}:3100
    command:
      - -config.file=/etc/loki/local-config.yml

  promtail:
    image: grafana/promtail:3.6.5
    restart: unless-stopped
    depends_on:
      - loki
      - git-ranker-api
    volumes:
      - ../git-ranker/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/var/lib/promtail
    command:
      - -config.file=/etc/promtail/config.yml

volumes:
  mysql_data:
  prometheus_data:
  loki_data:
  promtail_positions:
