name: "🛠️ Harness Engineering Task"
description: 사람이 빠르게 이해할 수 있는 작업 배경과 목표를 기록합니다.
title: "[Task] "
labels: ["task", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        이 템플릿은 사람이 읽는 작업 요약을 남기기 위한 용도입니다.

        각 항목은 짧은 문단 하나나 1~3개 bullet이면 충분합니다.
        아래에는 문제, 배경, 결과, 범위, 리스크처럼 판단에 필요한 내용만 적어 주세요.
        파일 목록, 브랜치 이름, exec plan 파일명, raw 검증 명령, 문서 inventory 같은 운영 상세는 exec plan이나 별도 증거에 둡니다.

  - type: dropdown
    id: target_repo
    attributes:
      label: 대상 저장소
      options:
        - git-ranker-workflow
        - git-ranker
        - git-ranker-client
        - cross-repo planning
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 문제 / 배경
      description: 지금 무엇이 문제인지, 무엇을 바꾸려는지 짧고 명확하게 적어 주세요.
    validations:
      required: true

  - type: textarea
    id: why_now
    attributes:
      label: 왜 지금 필요한가요?
      description: 지금 이 작업을 먼저 해야 하는 이유를 적어 주세요.
    validations:
      required: true

  - type: textarea
    id: expected_outcome
    attributes:
      label: 완료 조건 / 기대 결과
      description: 이 작업이 끝났다고 판단할 수 있는 결과만 적어 주세요.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: in_scope
    attributes:
      label: 이번 이슈에서 다루는 것
      description: 이번 작업에서 실제로 하려는 일만 적어 주세요.
      placeholder: |
        - ...
        - ...
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: 이번 이슈에서 다루지 않는 것
      description: 이번 이슈에 일부러 포함하지 않는 내용을 적어 주세요.
      placeholder: |
        - ...
        - ...
    validations:
      required: true

  - type: textarea
    id: approach_notes
    attributes:
      label: 접근 메모
      description: 어떤 방식으로 풀지와 주요 제약만 짧게 적어 주세요.
      placeholder: |
        - 먼저 정리할 기준
        - 비교할 대안
        - 주의해야 할 제약

  - type: textarea
    id: impact
    attributes:
      label: 영향 / 의존성
      description: 새 라이브러리, 외부 서비스, 설정 변경, 마이그레이션, 선행조건이 있으면 적고 없으면 `없음`이라고 적어 주세요.
      placeholder: |
        - 새 의존성:
        - 선행조건:
        - 운영 영향:

  - type: textarea
    id: risks_questions
    attributes:
      label: 리스크 / 확인이 필요한 점
      description: 남아 있는 리스크, 열린 질문, 리뷰어가 같이 봐야 할 점이 있으면 적어 주세요.
      placeholder: |
        - 리스크:
        - 확인 포인트:
        - 열린 질문:
